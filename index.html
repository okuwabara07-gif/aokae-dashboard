<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AOKAE ダッシュボード</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0a0a0f;--bg2:#111118;--bg3:#1a1a24;--border:rgba(255,255,255,0.07);--text:#e8e8f0;--text2:#888;--green:#00ff88;--red:#ff4466;--yellow:#ffcc00;--purple:#c084fc}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans JP',sans-serif;min-height:100vh}
header{padding:1.5rem 2rem;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;background:var(--bg);z-index:100}
.logo{font-family:'DM Mono',monospace;font-size:1.1rem;color:var(--purple)}
.header-stats{display:flex;gap:1.5rem;font-size:0.75rem;color:var(--text2)}
.dot{width:8px;height:8px;border-radius:50%;background:var(--green);animation:pulse 2s infinite;display:inline-block}
.dot.err{background:var(--red);animation:none}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.controls{padding:1rem 2rem;display:flex;gap:0.75rem;flex-wrap:wrap;border-bottom:1px solid var(--border);align-items:center}
.btn{padding:0.4rem 1rem;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--text2);cursor:pointer;font-size:0.75rem;font-family:inherit;transition:all .2s}
.btn:hover,.btn.active{border-color:var(--purple);color:var(--purple);background:rgba(124,58,237,0.1)}
.btn-check{background:var(--purple);color:white;border-color:var(--purple);font-weight:700}
.search{padding:0.4rem 1rem;border-radius:20px;border:1px solid var(--border);background:var(--bg2);color:var(--text);font-size:0.75rem;font-family:inherit;outline:none;width:200px}
.summary{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:1rem;padding:1.5rem 2rem;border-bottom:1px solid var(--border)}
.sum-card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:1rem}
.sum-label{font-size:0.7rem;color:var(--text2);margin-bottom:0.4rem}
.sum-val{font-size:1.8rem;font-weight:700;font-family:'DM Mono',monospace}
.sum-val.green{color:var(--green)}.sum-val.red{color:var(--red)}.sum-val.yellow{color:var(--yellow)}.sum-val.purple{color:var(--purple)}
.progress-bar{width:100%;height:3px;background:var(--border)}
.progress-fill{height:100%;background:var(--purple);transition:width .3s ease;width:0%}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:1rem;padding:1.5rem 2rem}
.site-card{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:1.25rem;transition:all .2s}
.site-card:hover{border-color:rgba(192,132,252,0.3);transform:translateY(-2px)}
.site-card.ok{border-left:3px solid var(--green)}
.site-card.error{border-left:3px solid var(--red)}
.site-card.checking{border-left:3px solid var(--yellow)}.site-card.pending{opacity:0.6;border-left:3px solid #444}
.card-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:0.75rem}
.card-name{font-weight:700;font-size:0.9rem}
.card-url{font-family:'DM Mono',monospace;font-size:0.65rem;color:var(--text2);margin-top:2px}
.status-badge{font-size:0.7rem;font-weight:700}
.status-badge.ok{color:var(--green)}.status-badge.error{color:var(--red)}.status-badge.checking{color:var(--yellow)}.status-badge.unknown{color:var(--text2)}
.check-list{display:flex;flex-wrap:wrap;gap:0.4rem;margin-top:0.75rem}
.check-tag{font-size:0.6rem;padding:0.15rem 0.5rem;border-radius:8px;border:1px solid var(--border)}
.check-tag.ok{border-color:rgba(0,255,136,0.3);color:var(--green);background:rgba(0,255,136,0.05)}
.check-tag.ng{border-color:rgba(255,68,102,0.3);color:var(--red);background:rgba(255,68,102,0.05)}
.check-tag.na{color:var(--text2)}
.card-actions{display:flex;justify-content:space-between;margin-top:0.75rem;font-size:0.65rem}
.card-actions a{color:var(--purple);text-decoration:none}
.card-actions span{color:var(--text2);cursor:pointer}
.token-input{width:100%;padding:0.5rem 1rem;border-radius:10px;border:1px solid var(--border);background:var(--bg2);color:var(--text);font-size:0.75rem;font-family:'DM Mono',monospace;outline:none;margin-bottom:1rem}
.token-input:focus{border-color:var(--purple)}
.token-section{padding:1rem 2rem;border-bottom:1px solid var(--border)}
.token-label{font-size:0.7rem;color:var(--text2);margin-bottom:0.5rem}
</style>
</head>
<body>
<header>
  <div class="logo">AOKAE / DASHBOARD</div>
  <div class="header-stats">
    <div><span class="dot" id="hd-dot"></span> <span id="hd-status">未確認</span></div>
    <div>最終確認: <span id="hd-time">-</span></div>
  </div>
</header>
<div class="token-section">
  <div class="token-label">🔑 GitHub Token（入力してから確認ボタンを押してください）</div>
  <input class="token-input" type="password" id="token-input" placeholder="ghp_..." />
</div>
<div class="controls">
  <button class="btn btn-check" onclick="checkAll()">🔍 全サイト確認</button>
  <button class="btn active" id="btn-all" onclick="filterSites('all')">すべて</button>
  <button class="btn" id="btn-ok" onclick="filterSites('ok')">✅ 正常</button>
  <button class="btn" id="btn-error" onclick="filterSites('error')">❌ エラー</button>
  <button class="btn" id="btn-ng-aff" onclick="filterSites('ng-aff')">⚠️ アフィリ未設置</button>
  <button class="btn" id="btn-ng-copa" onclick="filterSites('ng-copa')">⚠️ コパ未設置</button>
  <input class="search" type="text" placeholder="サイト検索..." oninput="searchSites(this.value)">
  <span style="font-size:0.7rem;color:var(--text2);margin-left:auto" id="progress-text"></span>
</div>
<div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
<div class="summary">
  <div class="sum-card"><div class="sum-label">総サイト数</div><div class="sum-val purple" id="s-total">51</div></div>
  <div class="sum-card"><div class="sum-label">正常稼働</div><div class="sum-val green" id="s-ok">-</div></div>
  <div class="sum-card"><div class="sum-label">エラー</div><div class="sum-val red" id="s-err">-</div></div>
  <div class="sum-card"><div class="sum-label">アフィリ設置</div><div class="sum-val yellow" id="s-aff">-</div></div>
  <div class="sum-card"><div class="sum-label">コパ設置</div><div class="sum-val purple" id="s-copa">-</div></div>
  <div class="sum-card"><div class="sum-label">sitemap設置</div><div class="sum-val yellow" id="s-sitemap">-</div></div>
</div>
<div class="grid" id="grid"></div>
<script>
const SITES=[
  {repo:'baby-note-jp',name:'ベビーノート',cat:'育児',deployed:true},
  {repo:'beauty-device-jp',name:'美容機器Lab',cat:'美容機器',deployed:false},
  {repo:'beauty-portal-jp',name:'ビューティーポータル',cat:'美容',deployed:true},
  {repo:'bike-note-jp',name:'バイクノート',cat:'バイク',deployed:false},
  {repo:'body-care-jp',name:'ボディケアLab',cat:'ボディ',deployed:false},
  {repo:'camera-lab-jp',name:'カメラLab',cat:'カメラ',deployed:true},
  {repo:'card-note-jp',name:'カードノート',cat:'クレカ',deployed:false},
  {repo:'career-note-jp',name:'キャリアノート',cat:'キャリア',deployed:true},
  {repo:'coffee-note-jp',name:'コーヒーノート',cat:'コーヒー',deployed:true},
  {repo:'colorpass-web',name:'COPA FORTUNE',cat:'占い',deployed:true},
  {repo:'cooking-note-jp',name:'料理ノート',cat:'料理',deployed:true},
  {repo:'diet-now',name:'ダイエットNow2',cat:'ダイエット',deployed:false},
  {repo:'diet-now-jp',name:'ダイエットNow',cat:'ダイエット',deployed:true},
  {repo:'english-lab-jp',name:'英語Lab',cat:'英語',deployed:true},
  {repo:'fashion-note-jp',name:'ファッションノート',cat:'ファッション',deployed:true},
  {repo:'fitness-lab-2026',name:'フィットネスLab2026',cat:'フィットネス',deployed:true},
  {repo:'fitness-lab-jp',name:'フィットネスLab',cat:'フィットネス',deployed:true},
  {repo:'freelance-note-jp',name:'フリーランスノート',cat:'副業',deployed:false},
  {repo:'fx-note-jp',name:'FXノート',cat:'FX',deployed:false},
  {repo:'gadget-lab-jp',name:'ガジェットLab',cat:'ガジェット',deployed:true},
  {repo:'golf-lab-jp',name:'ゴルフLab',cat:'ゴルフ',deployed:true},
  {repo:'hair-care-jp',name:'ヘアケアLab',cat:'ヘアケア',deployed:false},
  {repo:'haircolor-lab',name:'ヘアカラーLab',cat:'ヘアカラー',deployed:true},
  {repo:'health-note-jp',name:'健康ノート',cat:'健康',deployed:false},
  {repo:'insurance-note-jp',name:'保険ノート',cat:'保険',deployed:false},
  {repo:'interior-log-jp',name:'インテリアログ',cat:'インテリア',deployed:true},
  {repo:'job-change-jp',name:'転職ノート',cat:'転職',deployed:false},
  {repo:'kbeauty-brand-jp',name:'韓国コスメブランド',cat:'韓国コスメ',deployed:true},
  {repo:'kcos-review-jp',name:'韓国コスメレビュー',cat:'韓国コスメ',deployed:true},
  {repo:'kdrama-beauty-jp',name:'韓ドラ美容',cat:'韓国',deployed:true},
  {repo:'kmake-lab-jp',name:'韓国メイクLab',cat:'韓国メイク',deployed:true},
  {repo:'kskin-lab-jp',name:'韓国スキンLab',cat:'韓国スキン',deployed:true},
  {repo:'loan-note-jp',name:'ローンノート',cat:'ローン',deployed:false},
  {repo:'makeup-lab-jp',name:'メイクLab',cat:'メイク',deployed:true},
  {repo:'money-note-jp',name:'マネーノート',cat:'マネー',deployed:false},
  {repo:'nail-lab-jp',name:'ネイルLab',cat:'ネイル',deployed:true},
  {repo:'nisa-note-jp',name:'NISAノート',cat:'NISA',deployed:false},
  {repo:'outdoor-note-jp',name:'アウトドアノート',cat:'アウトドア',deployed:false},
  {repo:'pet-love-jp',name:'ペットラブ',cat:'ペット',deployed:true},
  {repo:'remote-work-jp',name:'リモートワーク',cat:'リモート',deployed:false},
  {repo:'running-note-jp',name:'ランニングノート',cat:'ランニング',deployed:false},
  {repo:'sauna-log-jp',name:'サウナログ',cat:'サウナ',deployed:true},
  {repo:'side-job-jp',name:'副業ノート',cat:'副業',deployed:true},
  {repo:'skill-up-jp',name:'スキルアップ',cat:'スキル',deployed:false},
  {repo:'skincare-note-jp',name:'スキンケアノート',cat:'スキンケア',deployed:true},
  {repo:'startup-note-jp',name:'スタートアップ',cat:'起業',deployed:false},
  {repo:'supplement-jp',name:'サプリLab',cat:'サプリ',deployed:false},
  {repo:'swim-note-jp',name:'スイムノート',cat:'水泳',deployed:false},
  {repo:'travel-log-jp',name:'トラベルログ',cat:'旅行',deployed:true},
  {repo:'yoga-lab-jp',name:'ヨガLab',cat:'ヨガ',deployed:false},
  {repo:'yoga-note-jp',name:'ヨガノート',cat:'ヨガ',deployed:true},
];
let siteData={};
let currentFilter='all';
let currentSearch='';

function getToken(){return document.getElementById('token-input').value.trim();}

async function checkSite(site){
  const TOKEN=getToken();
  if(!TOKEN){alert('GitHubトークンを入力してください');return;}
  updateCard(site,'checking',{});
  const r={status:'ok',hasAffiliate:false,hasCopa:false,hasAdSense:false,hasSitemap:false};
  const h={'Authorization':'token '+TOKEN};
  try{
    const treeRes=await fetch('https://api.github.com/repos/okuwabara07-gif/'+site.repo+'/git/trees/main?recursive=1',{headers:h});
    if(!treeRes.ok){r.status='error';siteData[site.repo]=r;updateCard(site,'error',r);updateSummary();return;}
    const tree=await treeRes.json();
    const files=(tree.tree||[]).map(f=>f.path);
    r.hasSitemap=files.some(f=>f.includes('sitemap.ts')||f.includes('sitemap.xml'));
    const targets=files.filter(f=>(f.endsWith('page.tsx')||f.endsWith('layout.tsx'))&&!f.includes('node_modules')).slice(0,8);
    for(const fp of targets){
      try{
        const res=await fetch('https://api.github.com/repos/okuwabara07-gif/'+site.repo+'/contents/'+fp.replace('[','%5B').replace(']','%5D'),{headers:h});
        if(!res.ok)continue;
        const d=await res.json();
        if(!d.content)continue;
        const c=atob(d.content.split('\n').join(''));
        if(c.includes('LAVA')||c.includes('ケラスターゼ')||c.includes('sponsored')||c.includes('forcise'))r.hasAffiliate=true;
        if(c.includes('colorpass-web.vercel.app')||c.includes('copa')||c.includes('コパ'))r.hasCopa=true;
        if(c.includes('ca-pub-3460729726810386'))r.hasAdSense=true;
      }catch{}
    }
  }catch{r.status='error';}
  siteData[site.repo]=r;
  updateCard(site,r.status,r);
  updateSummary();
}

function updateCard(site,status,r){
  const card=document.getElementById('c-'+site.repo);
  if(!card)return;
  card.className=`site-card ${status}${!site.deployed?' pending':''}`;
  const icon=status==='ok'?'✅':status==='checking'?'🔄':status==='error'?'❌':'⚪';
  const label=status==='ok'?'正常':status==='checking'?'確認中':status==='error'?'エラー':'未確認';
  card.innerHTML=`
    <div class="card-top">
      <div><div class="card-name">${site.name}</div><div class="card-url">${site.repo}</div></div>
      <div class="status-badge ${status}">${icon} ${label}</div>
    </div>
    <div class="check-list">
      <span class="check-tag ${r.hasSitemap?'ok':r.hasSitemap===false&&status==='ok'?'ng':'na'}">${r.hasSitemap?'✓':'✗'} sitemap</span>
      <span class="check-tag ${r.hasAffiliate?'ok':r.hasAffiliate===false&&status==='ok'?'ng':'na'}">${r.hasAffiliate?'✓':'✗'} アフィリ</span>
      <span class="check-tag ${r.hasCopa?'ok':r.hasCopa===false&&status==='ok'?'ng':'na'}">${r.hasCopa?'✓':'✗'} コパ</span>
      <span class="check-tag ${r.hasAdSense?'ok':r.hasAdSense===false&&status==='ok'?'ng':'na'}">${r.hasAdSense?'✓':'✗'} AdSense</span>
    </div>
    <div class="card-actions">
      <a href="https://${site.repo}.vercel.app" target="_blank">→ サイトを開く</a>
      <span onclick='checkSite(${JSON.stringify(site)})'>🔄 再確認</span>
    </div>`;
}

function renderAll(){
  const g=document.getElementById('grid');
  g.innerHTML='';
  SITES.forEach(s=>{
    const d=document.createElement('div');
    d.className='site-card unknown';
    d.id='c-'+s.repo;
    d.innerHTML=`
      <div class="card-top">
        <div><div class="card-name">${s.name}</div><div class="card-url">${s.repo}</div></div>
        <div class="status-badge unknown">⚪ 未確認</div>
      </div>
      <div class="check-list">
        <span class="check-tag na">- sitemap</span>
        <span class="check-tag na">- アフィリ</span>
        <span class="check-tag na">- コパ</span>
        <span class="check-tag na">- AdSense</span>
      </div>
      <div class="card-actions">
        <a href="https://${s.repo}.vercel.app" target="_blank">→ サイトを開く</a>
        <span onclick='checkSite(${JSON.stringify(s)})'>🔄 再確認</span>
      </div>`;
    g.appendChild(d);
  });
}

async function checkAll(){
  const TOKEN=getToken();
  if(!TOKEN){alert('GitHubトークンを入力してください');return;}
  const btn=document.querySelector('.btn-check');
  btn.textContent='確認中...';btn.disabled=true;
  let done=0;
  for(const s of SITES){
    await checkSite(s);
    done++;
    document.getElementById('progress-fill').style.width=(done/SITES.length*100)+'%';
    document.getElementById('progress-text').textContent=`${done}/${SITES.length}`;
    await new Promise(r=>setTimeout(r,300));
  }
  btn.textContent='🔍 全サイト確認';btn.disabled=false;
  document.getElementById('hd-time').textContent=new Date().toLocaleTimeString('ja-JP');
  applyFilter();
}

function updateSummary(){
  const v=Object.values(siteData);
  document.getElementById('s-ok').textContent=v.filter(x=>x.status==='ok').length;
  document.getElementById('s-err').textContent=v.filter(x=>x.status==='error').length;
  document.getElementById('s-aff').textContent=v.filter(x=>x.hasAffiliate).length;
  document.getElementById('s-copa').textContent=v.filter(x=>x.hasCopa).length;
  document.getElementById('s-sitemap').textContent=v.filter(x=>x.hasSitemap).length;
  const err=v.filter(x=>x.status==='error').length;
  document.getElementById('hd-dot').className=err>0?'dot err':'dot';
  document.getElementById('hd-status').textContent=err>0?`${err}件エラー`:'全サイト正常';
}

function filterSites(f){
  currentFilter=f;
  ['all','ok','error','ng-aff','ng-copa'].forEach(x=>{
    const b=document.getElementById('btn-'+x);
    if(b)b.classList.toggle('active',x===f);
  });
  applyFilter();
}

function searchSites(q){currentSearch=q.toLowerCase();applyFilter();}

function applyFilter(){
  SITES.forEach(s=>{
    const card=document.getElementById('c-'+s.repo);
    if(!card)return;
    const d=siteData[s.repo]||{};
    const matchFilter=
      currentFilter==='all'||
      (currentFilter==='ok'&&d.status==='ok')||
      (currentFilter==='error'&&d.status==='error')||
      (currentFilter==='ng-aff'&&!d.hasAffiliate&&d.status==='ok')||
      (currentFilter==='ng-copa'&&!d.hasCopa&&d.status==='ok');
    const matchSearch=!currentSearch||s.repo.includes(currentSearch)||s.name.includes(currentSearch);
    card.style.display=(matchFilter&&matchSearch)?'':'none';
  });
}

renderAll();
// localStorageからトークン復元
const saved=localStorage.getItem('gh_token');
if(saved)document.getElementById('token-input').value=saved;
document.getElementById('token-input').addEventListener('change',e=>{
  localStorage.setItem('gh_token',e.target.value);
});
</script>
</body>
</html>
