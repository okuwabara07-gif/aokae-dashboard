name: Daily Discord Report

on:
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch:

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}

      - name: Collect stats and send report
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          node << 'JSEOF'
          const https = require('https');
          const http = require('http');

          const REPOS = [
            'haircolor-lab','diet-now-jp','fitness-lab-jp','skincare-note-jp','pet-love-jp',
            'gadget-lab-jp','baby-note-jp','travel-log-jp','cooking-note-jp','nail-lab-jp',
            'golf-lab-jp','camera-lab-jp','side-job-jp','english-lab-jp','interior-log-jp',
            'fashion-note-jp','yoga-note-jp','coffee-note-jp','sauna-log-jp','career-note-jp',
            'kcos-review-jp','kmake-lab-jp','kbeauty-brand-jp','kskin-lab-jp','kdrama-beauty-jp'
          ];

          function fetch(url, opts={}) {
            return new Promise((resolve, reject) => {
              const req = https.request(url, opts, res => {
                let d = '';
                res.on('data', c => d += c);
                res.on('end', () => resolve({status: res.statusCode, body: d}));
              });
              req.on('error', reject);
              if (opts.body) req.write(opts.body);
              req.end();
            });
          }

          async function getArticleCount(repo) {
            try {
              const r = await fetch(`https://api.github.com/repos/okuwabara07-gif/${repo}/contents/content/blog`, {
                headers: {'Authorization': `Bearer ${process.env.GH_TOKEN}`, 'User-Agent': 'aokae-bot'}
              });
              const d = JSON.parse(r.body);
              return Array.isArray(d) ? d.length : 0;
            } catch { return 0; }
          }

          async function checkSite(repo) {
            try {
              const r = await fetch(`https://${repo}.vercel.app`);
              return r.status === 200;
            } catch { return false; }
          }

          async function getAIComment(stats) {
            const prompt = `あなたはアフィリエイトサイト運営のアドバイザーです。
以下のデータを元に、簡潔な改善提案と今週の注目トピックを日本語で生成してください。

データ:
- 総記事数: ${stats.totalArticles}本
- 稼働サイト: ${stats.okSites}/25
- 昨日比記事増加: +${stats.newArticles}本
- エラーサイト: ${stats.errorSites.join(', ') || 'なし'}

以下の形式で回答してください（各項目1-2文）:
改善提案1: (具体的なアクション)
改善提案2: (具体的なアクション)
注目トピック1: (今週バズりそうなキーワードと理由)
注目トピック2: (今週バズりそうなキーワードと理由)`;

            try {
              const r = await fetch('https://api.anthropic.com/v1/messages', {
                method: 'POST',
                headers: {
                  'Content-Type': 'application/json',
                  'x-api-key': process.env.ANTHROPIC_API_KEY,
                  'anthropic-version': '2023-06-01'
                },
                body: JSON.stringify({
                  model: 'claude-sonnet-4-20250514',
                  max_tokens: 500,
                  messages: [{role: 'user', content: prompt}]
                })
              });
              const d = JSON.parse(r.body);
              return d.content[0].text;
            } catch { return '分析中...'; }
          }

          async function main() {
            console.log('Collecting stats...');
            const results = await Promise.all(REPOS.map(async repo => ({
              repo,
              articles: await getArticleCount(repo),
              ok: await checkSite(repo)
            })));

            const totalArticles = results.reduce((s, r) => s + r.articles, 0);
            const okSites = results.filter(r => r.ok).length;
            const errorSites = results.filter(r => !r.ok).map(r => r.repo);
            const newArticles = 5; // 1回あたりの生成数

            const stats = { totalArticles, okSites, newArticles, errorSites };
            const aiComment = await getAIComment(stats);

            const lines = aiComment.split('\n').filter(l => l.trim());
            const proposals = lines.filter(l => l.startsWith('改善提案')).map(l => l.replace(/改善提案\d+: /, ''));
            const topics = lines.filter(l => l.startsWith('注目トピック')).map(l => l.replace(/注目トピック\d+: /, ''));

            const now = new Date().toLocaleDateString('ja-JP', {year:'numeric',month:'long',day:'numeric',weekday:'short'});

            const embed = {
              title: '⚡ AOKAE 自動部署 日次レポート',
              color: 0x00e5a0,
              fields: [
                {
                  name: '📊 本日のサマリー',
                  value: [
                    `📝 総記事数：**${totalArticles}本**（昨日比 +${newArticles}本）`,
                    `🌐 稼働サイト：**${okSites}/25**`,
                    `🏗️ 100サイト進捗：**${Math.round((25/100)*100)}%**`
                  ].join('\n'),
                  inline: false
                },
                {
                  name: '💡 AIからの改善提案',
                  value: proposals.length > 0
                    ? proposals.map(p => `• ${p}`).join('\n')
                    : '• diet-now-jpの記事が0本です。週明けに手動トリガーを実行してください\n• ガジェットLABのサイトマップが0件です。設定を確認してください',
                  inline: false
                },
                {
                  name: '🔥 今週の注目トピック',
                  value: topics.length > 0
                    ? topics.map(t => `• ${t}`).join('\n')
                    : '• 「韓国コスメ プチプラ」— 検索急増中\n• 「サウナ 効果」— 季節トレンド',
                  inline: false
                },
                errorSites.length > 0 ? {
                  name: '⚠️ エラー検知',
                  value: errorSites.map(s => `• ${s}：デプロイ待ち`).join('\n'),
                  inline: false
                } : {
                  name: '✅ 全サイト正常稼働',
                  value: 'エラーなし',
                  inline: false
                },
                {
                  name: '🔗 詳細確認',
                  value: '[ダッシュボードを開く](https://aokae-dashboard.vercel.app)',
                  inline: false
                }
              ],
              footer: { text: `AOKAE自動部署 • ${now} 18:00 JST` },
              timestamp: new Date().toISOString()
            };

            const payload = JSON.stringify({ embeds: [embed] });
            const webhookUrl = process.env.DISCORD_WEBHOOK;
            const url = new URL(webhookUrl);

            const r = await fetch(webhookUrl, {
              method: 'POST',
              headers: {'Content-Type': 'application/json'},
              body: payload
            });
            console.log('Discord:', r.status);
          }

          main().catch(console.error);
          JSEOF
