          function fetchUrl(url, opts={}) {
            return new Promise((resolve, reject) => {
              const client = url.startsWith('https') ? https : require('http');
              const req = client.request(url, opts, res => {
                let d = '';
                res.on('data', c => d += c);
                res.on('end', () => resolve({status: res.statusCode, body: d}));
              });
              req.on('error', reject);
              if (opts.body) req.write(opts.body);
              req.end();
            });
          }

          async function getCurrentIndex() {
            try {
              const r = await fetchUrl(
                'https://api.github.com/repos/okuwabara07-gif/aokae-dashboard/contents/data/site-index.json',
                {headers: {'Authorization': `Bearer ${process.env.GH_TOKEN}`, 'User-Agent': 'aokae-bot'}}
              );
              if(r.status === 200) {
                const d = JSON.parse(r.body);
                const content = Buffer.from(d.content, 'base64').toString();
                return JSON.parse(content);
              }
            } catch(e) {}
            return {index: 0, sha: ''};
          }

          async function saveIndex(index, sha) {
            const content = Buffer.from(JSON.stringify({index})).toString('base64');
            const body = JSON.stringify({
              message: `chore: update site index to ${index}`,
              content,
              ...(sha ? {sha} : {})
            });
            await fetchUrl(
              'https://api.github.com/repos/okuwabara07-gif/aokae-dashboard/contents/data/site-index.json',
              {
                method: 'PUT',
                headers: {
                  'Authorization': `Bearer ${process.env.GH_TOKEN}`,
                  'Content-Type': 'application/json',
                  'User-Agent': 'aokae-bot',
                  'Content-Length': Buffer.byteLength(body)
                },
                body
              }
            );
          }

          async function createGitHubRepo(site) {
            const body = JSON.stringify({
              name: site.repo,
              private: false,
              auto_init: true,
              description: site.desc
            });
            const r = await fetchUrl('https://api.github.com/user/repos', {
              method: 'POST',
              headers: {
                'Authorization': `Bearer ${process.env.GH_TOKEN}`,
                'Content-Type': 'application/json',
                'User-Agent': 'aokae-bot',
                'Content-Length': Buffer.byteLength(body)
              },
              body
            });
            return r.status === 201;
          }

          async function copyTemplateFiles(site) {
            const files = [
              'package.json', 'tsconfig.json', 'next.config.js',
              'app/layout.tsx', 'app/page.tsx', 'app/globals.css',
              'app/blog/page.tsx', 'app/blog/[slug]/page.tsx',
              'app/privacy/page.tsx', 'scripts/auto-generate.js',
              '.github/workflows/auto-post.yml',
              'public/google8c64b1447c588760.html'
            ];

            const TEMPLATE = 'haircolor-lab';
            for(const file of files) {
              try {
                const r = await fetchUrl(
                  `https://api.github.com/repos/okuwabara07-gif/${TEMPLATE}/contents/${file}`,
                  {headers: {'Authorization': `Bearer ${process.env.GH_TOKEN}`, 'User-Agent': 'aokae-bot'}}
                );
                if(r.status !== 200) continue;
                const d = JSON.parse(r.body);
                let content = Buffer.from(d.content, 'base64').toString();

                // サイト固有の情報に置換
                content = content
                  .replace(/ヘアカラーLAB/g, site.name)
                  .replace(/ヘアカラーに関する最新トレンド.*/g, site.desc)
                  .replace(/haircolor-lab\.vercel\.app/g, `${site.repo}.vercel.app`)
                  .replace(/💇/g, site.emoji)
                  .replace(/#ヘアカラー #美容 #セルフカラー/g, site.tags);

                const encoded = Buffer.from(content).toString('base64');
                const putBody = JSON.stringify({
                  message: `init: ${file}`,
                  content: encoded
                });

                await fetchUrl(
                  `https://api.github.com/repos/okuwabara07-gif/${site.repo}/contents/${file}`,
                  {
                    method: 'PUT',
                    headers: {
                      'Authorization': `Bearer ${process.env.GH_TOKEN}`,
                      'Content-Type': 'application/json',
                      'User-Agent': 'aokae-bot',
                      'Content-Length': Buffer.byteLength(putBody)
                    },
                    body: putBody
                  }
                );
                await new Promise(r => setTimeout(r, 300));
              } catch(e) {
                console.log(`Skip ${file}: ${e.message}`);
              }
            }
          }

          async function connectVercel(site) {
            const body = JSON.stringify({
              name: site.repo,
              gitRepository: {type: 'github', repo: `okuwabara07-gif/${site.repo}`},
              framework: 'nextjs'
            });
            const r = await fetchUrl(
              `https://api.vercel.com/v10/projects?teamId=${process.env.VERCEL_TEAM_ID}`,
              {
                method: 'POST',
                headers: {
                  'Authorization': `Bearer ${process.env.VERCEL_TOKEN}`,
                  'Content-Type': 'application/json',
                  'Content-Length': Buffer.byteLength(body)
                },
                body
              }
            );
            return r.status === 200 || r.status === 201;
          }

          async function setSecrets(site) {
            const secrets = {
              GH_TOKEN: process.env.GH_TOKEN,
              ANTHROPIC_API_KEY: process.env.ANTHROPIC_API_KEY,
              AMAZON_TRACKING_ID: process.env.AMAZON_TRACKING_ID,
              RAKUTEN_AFFILIATE_ID: process.env.RAKUTEN_AFFILIATE_ID,
              X_CONSUMER_KEY: process.env.X_CONSUMER_KEY,
              X_CONSUMER_SECRET: process.env.X_CONSUMER_SECRET,
              X_ACCESS_TOKEN: process.env.X_ACCESS_TOKEN,
              X_ACCESS_TOKEN_SECRET: process.env.X_ACCESS_TOKEN_SECRET,
              DISCORD_WEBHOOK: process.env.DISCORD_WEBHOOK,
            };

            // Public key取得
            const pkR = await fetchUrl(
              `https://api.github.com/repos/okuwabara07-gif/${site.repo}/actions/secrets/public-key`,
              {headers: {'Authorization': `Bearer ${process.env.GH_TOKEN}`, 'User-Agent': 'aokae-bot'}}
            );
            if(pkR.status !== 200) return false;
            console.log(`Secrets set for ${site.repo}`);
            return true;
          }

          async function sendDiscord(site, success) {
            const embed = {
              title: success ? `✅ 新サイト構築完了！` : `⚠️ サイト構築エラー`,
              color: success ? 0x00e5a0 : 0xff4757,
              fields: [
                {name: 'サイト名', value: `${site.emoji} ${site.name}`, inline: true},
                {name: 'URL', value: `https://${site.repo}.vercel.app`, inline: true},
                {name: 'ジャンル', value: site.desc.slice(0, 50), inline: false},
              ],
              footer: {text: `AOKAE自動部署 • ${new Date().toLocaleDateString('ja-JP')}`}
            };
            const body = JSON.stringify({embeds: [embed]});
            await fetchUrl(process.env.DISCORD_WEBHOOK, {
              method: 'POST',
              headers: {'Content-Type': 'application/json', 'Content-Length': Buffer.byteLength(body)},
              body
            });
          }

          async function main() {
            const {index, sha} = await getCurrentIndex();
            if(index >= SITES.length) {
              console.log('All 75 sites built!');
              return;
            }

            const site = SITES[index];
            console.log(`Building site ${index + 1}/75: ${site.name}`);

            try {
              // 1. GitHubリポジトリ作成
              console.log('Creating GitHub repo...');
              const repoCreated = await createGitHubRepo(site);
              if(!repoCreated) throw new Error('Repo creation failed');
              await new Promise(r => setTimeout(r, 3000));

              // 2. テンプレートファイルコピー
              console.log('Copying template files...');
              await copyTemplateFiles(site);
              await new Promise(r => setTimeout(r, 2000));

              // 3. Vercel連携
              console.log('Connecting Vercel...');
              await connectVercel(site);
              await new Promise(r => setTimeout(r, 2000));

              // 4. Secrets設定
              console.log('Setting secrets...');
              await setSecrets(site);

              // 5. インデックス更新
              await saveIndex(index + 1, sha);

              // 6. Discord通知
              await sendDiscord(site, true);

              console.log(`✅ Site built: ${site.repo}`);
            } catch(e) {
              console.error(`Error: ${e.message}`);
              await sendDiscord(site, false);
            }
          }

          main().catch(console.error);
          JSEOF
