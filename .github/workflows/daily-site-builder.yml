name: Daily Site Builder

on:
  schedule:
    - cron: '0 0 * * *'
    - cron: '0 8 * * *'
  workflow_dispatch:

jobs:
  build-site:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}

      - name: Build next site
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_TEAM_ID: ${{ secrets.VERCEL_TEAM_ID }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          AMAZON_TRACKING_ID: ${{ secrets.AMAZON_TRACKING_ID }}
          RAKUTEN_AFFILIATE_ID: ${{ secrets.RAKUTEN_AFFILIATE_ID }}
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          X_CONSUMER_KEY: ${{ secrets.X_CONSUMER_KEY }}
          X_CONSUMER_SECRET: ${{ secrets.X_CONSUMER_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
        run: |
          node << 'JSEOF'
          const https = require('https');
          const fs = require('fs');

          function fetchUrl(url, opts={}) {
            return new Promise((resolve, reject) => {
              const client = url.startsWith('https') ? https : require('http');
              const req = client.request(url, opts, res => {
                let d = '';
                res.on('data', c => d += c);
                res.on('end', () => resolve({status: res.statusCode, body: d}));
              });
              req.on('error', reject);
              if (opts.body) req.write(opts.body);
              req.end();
            });
          }

          async function getCurrentIndex() {
            try {
              const r = await fetchUrl(
                'https://api.github.com/repos/okuwabara07-gif/aokae-dashboard/contents/data/site-index.json',
                {headers: {'Authorization': `Bearer ${process.env.GH_TOKEN}`, 'User-Agent': 'aokae-bot'}}
              );
              if(r.status === 200) {
                const d = JSON.parse(r.body);
                const content = Buffer.from(d.content, 'base64').toString();
                return {index: JSON.parse(content).index, sha: d.sha};
              }
            } catch(e) {}
            return {index: 0, sha: ''};
          }

          async function saveIndex(index, sha) {
            const content = Buffer.from(JSON.stringify({index})).toString('base64');
            const body = JSON.stringify({
              message: `chore: update site index to ${index}`,
              content,
              ...(sha ? {sha} : {})
            });
            await fetchUrl(
              'https://api.github.com/repos/okuwabara07-gif/aokae-dashboard/contents/data/site-index.json',
              {
                method: 'PUT',
                headers: {
                  'Authorization': `Bearer ${process.env.GH_TOKEN}`,
                  'Content-Type': 'application/json',
                  'User-Agent': 'aokae-bot',
                  'Content-Length': Buffer.byteLength(body)
                },
                body
              }
            );
          }

          async function getSiteQueue() {
            const r = await fetchUrl(
              'https://api.github.com/repos/okuwabara07-gif/aokae-dashboard/contents/data/site-queue.json',
              {headers: {'Authorization': `Bearer ${process.env.GH_TOKEN}`, 'User-Agent': 'aokae-bot'}}
            );
            const d = JSON.parse(r.body);
            return JSON.parse(Buffer.from(d.content, 'base64').toString());
          }

          async function createRepo(site) {
            const body = JSON.stringify({name: site.repo, private: false, auto_init: true, description: site.desc});
            const r = await fetchUrl('https://api.github.com/user/repos', {
              method: 'POST',
              headers: {'Authorization': `Bearer ${process.env.GH_TOKEN}`, 'Content-Type': 'application/json', 'User-Agent': 'aokae-bot', 'Content-Length': Buffer.byteLength(body)},
              body
            });
            return r.status === 201 || r.status === 422;
          }

          async function copyFiles(site) {
            const TEMPLATE = 'haircolor-lab';
            const files = ['package.json','tsconfig.json','next.config.js','app/layout.tsx','app/page.tsx','app/globals.css','app/blog/page.tsx','app/blog/[slug]/page.tsx','app/privacy/page.tsx','lib/posts.ts','.github/workflows/auto-post.yml'];
            for(const f of files) {
              try {
                const r = await fetchUrl(`https://api.github.com/repos/okuwabara07-gif/${TEMPLATE}/contents/${f}`, {headers:{'Authorization':`Bearer ${process.env.GH_TOKEN}`,'User-Agent':'aokae-bot'}});
                if(r.status!==200) continue;
                const d = JSON.parse(r.body);
                let content = Buffer.from(d.content,'base64').toString();
                content = content.replace(/ヘアカラーLAB/g,site.name).replace(/haircolor-lab\.vercel\.app/g,`${site.repo}.vercel.app`).replace(/haircolor-lab/g,site.repo).replace(/💇/g,site.emoji);
                const encoded = Buffer.from(content).toString('base64');
                const pb = JSON.stringify({message:`init: ${f}`,content:encoded});
                await fetchUrl(`https://api.github.com/repos/okuwabara07-gif/${site.repo}/contents/${f}`,{method:'PUT',headers:{'Authorization':`Bearer ${process.env.GH_TOKEN}`,'Content-Type':'application/json','User-Agent':'aokae-bot','Content-Length':Buffer.byteLength(pb)},body:pb});
                await new Promise(r=>setTimeout(r,300));
              } catch(e) {}
            }
          }

          async function connectVercel(site) {
            const body = JSON.stringify({name:site.repo,gitRepository:{type:'github',repo:`okuwabara07-gif/${site.repo}`},framework:'nextjs'});
            const r = await fetchUrl(`https://api.vercel.com/v10/projects?teamId=${process.env.VERCEL_TEAM_ID}`,{method:'POST',headers:{'Authorization':`Bearer ${process.env.VERCEL_TOKEN}`,'Content-Type':'application/json','Content-Length':Buffer.byteLength(body)},body});
            return r.status===200||r.status===201||r.status===409;
          }

          async function sendDiscord(site, index) {
            const embed = {
              title: `✅ 新サイト構築完了！`,
              color: 0x00e5a0,
              fields: [
                {name:'サイト名',value:`${site.emoji} ${site.name}`,inline:true},
                {name:'URL',value:`https://${site.repo}.vercel.app`,inline:true},
                {name:'進捗',value:`${26+index}/100サイト完了`,inline:false},
                {name:'次のビルド',value:'AM9時 または PM17時',inline:false},
              ],
              footer:{text:`AOKAE自動部署 • 1日2サイト • ${new Date().toLocaleDateString('ja-JP')}`}
            };
            const body = JSON.stringify({embeds:[embed]});
            await fetchUrl(process.env.DISCORD_WEBHOOK,{method:'POST',headers:{'Content-Type':'application/json','Content-Length':Buffer.byteLength(body)},body});
          }

          async function main() {
            const {index, sha} = await getCurrentIndex();
            const queue = await getSiteQueue();
            if(index >= queue.length) { console.log('All sites built!'); return; }
            const site = queue[index];
            console.log(`Building: ${site.name} (${index+1}/${queue.length})`);
            await createRepo(site);
            await new Promise(r=>setTimeout(r,3000));
            await copyFiles(site);
            await new Promise(r=>setTimeout(r,2000));
            await connectVercel(site);
            await saveIndex(index+1, sha);
            await sendDiscord(site, index+1);
            console.log(`✅ Done: https://${site.repo}.vercel.app`);
          }

          main().catch(console.error);
          JSEOF
